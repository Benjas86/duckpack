name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: duckpack
            asset_name: duckpack-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: duckpack
            asset_name: duckpack-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: duckpack
            asset_name: duckpack-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: duckpack.exe
            asset_name: duckpack-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename Artifact (Linux/macOS)
        run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
        if: runner.os != 'Windows'
        
      - name: Rename Artifact (Windows)
        run: mv target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
        if: runner.os == 'Windows'
        shell: bash

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
